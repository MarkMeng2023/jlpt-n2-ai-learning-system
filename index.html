<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="JLPT N2 单题学习与弱点记录工具" />
    <title>JLPT N2 AI Learning System</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <p class="eyebrow">JLPT N2 · Sprint 2</p>
        <h1>一题一反馈，慢慢把盲点照亮。</h1>
        <p class="subtitle">完成作答后，系统会判题、记录弱点并同步到 Google Sheets。</p>
      </header>

      <section class="progress-summary" aria-label="学习进度">
        <div><span>题库总数</span><strong id="total-count">—</strong></div>
        <div><span>已完成</span><strong id="completed-count">—</strong></div>
        <div><span>剩余</span><strong id="remaining-count">—</strong></div>
      </section>
      <p id="progress-status" class="progress-status" aria-live="polite">正在读取学习进度...</p>

      <section id="app-message" class="notice hidden" role="alert"></section>

      <section id="question-card" class="card" aria-labelledby="question-heading">
        <div class="question-meta">
          <span id="question-number">题目读取中</span>
          <span id="question-type" class="tag"></span>
        </div>

        <h2 id="question-heading" class="question-prompt">题目加载中…</h2>
        <form id="answer-form">
          <fieldset id="choices" class="choices">
            <legend class="sr-only">请选择答案</legend>
          </fieldset>

          <fieldset id="confidence" class="confidence-group">
            <legend>作答确定度</legend>
            <label><input type="radio" name="confidence" value="sure" /> 确定</label>
            <label><input type="radio" name="confidence" value="uncertain" /> 不确定</label>
            <label><input type="radio" name="confidence" value="guessed" /> 蒙的</label>
          </fieldset>

          <div class="actions">
            <button id="submit-button" type="submit" class="button button-primary">提交答案</button>
            <button id="next-button" type="button" class="button hidden">下一题</button>
          </div>
        </form>

        <div id="feedback" class="feedback hidden" aria-live="polite">
          <h3 id="feedback-title"></h3>
          <p id="correct-answer"></p>
          <p id="explanation"></p>
        </div>
      </section>

      <section class="card compact" aria-labelledby="sync-heading">
        <div class="section-heading">
          <h2 id="sync-heading">同步状态</h2>
          <span id="pending-count" class="pending-badge">待同步：0 条</span>
        </div>
        <p id="sync-status" class="status-text" aria-live="polite">尚未提交答案</p>
        <p id="sync-detail" class="muted"></p>
      </section>

      <section id="prompt-section" class="card hidden" aria-labelledby="prompt-heading">
        <div class="section-heading">
          <h2 id="prompt-heading">给 ChatGPT 的讲解请求</h2>
          <button id="copy-button" type="button" class="button button-small">复制文本</button>
        </div>
        <textarea id="chatgpt-prompt" rows="18" readonly></textarea>
        <p id="copy-status" class="muted" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
